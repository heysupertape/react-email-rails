name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ruby:
    name: Ruby ${{ matrix.ruby }} / Rails ${{ matrix.rails.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - "3.3"
          - "3.4"
          - "4.0"
        rails:
          - name: "latest"
            gemfile: Gemfile
          - name: "8.0"
            gemfile: gemfiles/rails_8_0.gemfile
          - name: "7.2"
            gemfile: gemfiles/rails_7_2.gemfile
    env:
      BUNDLE_GEMFILE: ${{ matrix.rails.gemfile }}
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: ruby scripts/check_version_sync.rb
      - run: bundle exec rake
      - run: bundle exec rubocop
      - run: bundle exec rake build

  node:
    name: Node ${{ matrix.node }} / Vite ${{ matrix.vite }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - "20"
          - "22"
          - "24"
        vite:
          - "7"
          - "8"
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.34.1
          run_install: false
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          cache-dependency-path: vite/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: vite
      - run: pnpm add --save-dev vite@${{ matrix.vite }} --allow-build=esbuild
        if: matrix.vite != '8'
        working-directory: vite
      - run: pnpm run ci
        working-directory: vite
      - run: pnpm pack --dry-run
        working-directory: vite
